services:
  # Chainlit application backend
  chainlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chainlit_app
    restart: unless-stopped
    environment:
      # LLM API Configuration
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL:-https://api.openai.com/v1}
      - MODEL=${MODEL:-Qwen/Qwen3-32B}
      # Chainlit Configuration
      - CHAINLIT_HOST=0.0.0.0
      - CHAINLIT_PORT=8006
      - CHAINLIT_HEADLESS=false
      - CHAINLIT_AUTH_ENABLED=false
    volumes:
      # Application code (needs write access for database)
      - .:/app
      # MCP configuration (read-only)
      - ./mcp_config.json:/app/mcp_config.json:ro
      # Persistent data volume for SQLite database
      - chatlit_data:/app/data
    expose:
      - 8006
    networks:
      - chainlit_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx reverse proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: chainlit_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    networks:
      - chainlit_network
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  chainlit_network:
    driver: bridge
    name: chainlit_network

volumes:
  # Persistent volume for SQLite database
  chatlit_data:
    driver: local
  # Persistent volumes for data (if needed for other purposes)
  data:
    driver: local
